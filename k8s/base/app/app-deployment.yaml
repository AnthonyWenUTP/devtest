apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-playground
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: devops-playground
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 50%
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-playground
        app.kubernetes.io/component: application
        app.kubernetes.io/instance: devops-playground
    spec:
      containers:
        - name: app
          image: anthonywen07/devops-playground:latest
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "128Mi"
              cpu: "200m"